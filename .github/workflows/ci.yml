name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Compile Python files
        run: python -m compileall .

      - name: Check upstream watcher help path
        run: python -m py_compile tools/upstream_watch.py

      - name: Validate Docker Compose configuration
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config
          elif [ -f compose.yml ]; then
            docker compose -f compose.yml config
          else
            echo "No Docker Compose file found; skipping compose validation."
          fi

      - name: Secret hygiene quick scan
        run: |
          set -e
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY)' -- . ':!README.md' ':!docs/**'; then
            echo "Potential committed secret found. Review the matches above."
            exit 1
          fi
          echo "No obvious committed secrets found."
