name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Compile maintained runtime files
        run: |
          python -m py_compile \
            prometheus_consultant.py \
            prometheus_indexer.py \
            prometheus_json.py \
            tools/benchmark_consultant.py

      - name: Run consultant runtime tests
        run: python -m pytest -q tests/test_consultant_runtime.py

      - name: Run deterministic consultant benchmark
        run: python tools/benchmark_consultant.py --workspace . --output benchmark-results/ci_consultant_benchmark.json

      - name: Validate Docker Compose configuration
        env:
          REAL_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          GEMINI_API_KEY: placeholder
          TELEGRAM_TOKEN: placeholder
          TELEGRAM_CHAT_ID: placeholder
          VPS_PUBLIC_IP: 127.0.0.1
          PWD: ${{ github.workspace }}
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config >/tmp/prometheus-compose.yml
            echo "Docker Compose configuration is valid."
          elif [ -f compose.yml ]; then
            docker compose -f compose.yml config >/tmp/prometheus-compose.yml
            echo "Docker Compose configuration is valid."
          else
            echo "No Docker Compose file found; skipping compose validation."
          fi

      - name: Secret hygiene quick scan
        run: |
          set -euo pipefail
          matches="$(git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY)' -- . ':!README.md' ':!docs/**' ':!docker-compose.yml' ':!config/**' ':!*.example' ':!**/*.example' || true)"
          matches="$(printf '%s\n' "$matches" | grep -v 'sk-prometheus-dummy' || true)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Potential committed secret found. Review the matches above."
            exit 1
          fi
          echo "No obvious committed secrets found."
