name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-ci.txt
            requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CI Python dependencies
        run: |
          if [ -f requirements-ci.txt ]; then
            python -m pip install -r requirements-ci.txt
          else
            python -m pip install pytest redis openai pydantic PyYAML
          fi

      - name: Compile Python files without generated folders
        run: |
          python - <<'PY'
          import compileall
          import pathlib
          import sys

          excluded_parts = {'.git', 'node_modules', 'venv', '.venv', '__pycache__', 'workspace', 'hive_mind_db'}
          failed = False
          for path in pathlib.Path('.').rglob('*.py'):
              if any(part in excluded_parts for part in path.parts):
                  continue
              ok = compileall.compile_file(str(path), quiet=1, force=True)
              failed = failed or not ok
          sys.exit(1 if failed else 0)
          PY

      - name: Run runtime safety tests
        run: pytest -q tests/test_consultant_runtime.py

      - name: Run deterministic consultant benchmark
        run: python tools/benchmark_consultant.py --workspace . --output benchmark-results/ci_consultant_benchmark.json

      - name: Validate Docker Compose configuration
        env:
          REAL_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          GEMINI_API_KEY: placeholder
          TELEGRAM_TOKEN: placeholder
          TELEGRAM_CHAT_ID: placeholder
          VPS_PUBLIC_IP: 127.0.0.1
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config
          elif [ -f compose.yml ]; then
            docker compose -f compose.yml config
          else
            echo "No Docker Compose file found; skipping compose validation."
          fi

      - name: Secret hygiene quick scan
        run: |
          set -e
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY)' -- . ':!README.md' ':!docs/**' ':!docker-compose.yml' ':!config/**' ':!*.example' ':!**/*.example'; then
            echo "Potential committed secret found. Review the matches above."
            exit 1
          fi
          echo "No obvious committed secrets found."
