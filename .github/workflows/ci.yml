name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Compile maintained runtime files
        run: |
          python -m py_compile \
            prometheus_consultant.py \
            prometheus_indexer.py \
            prometheus_json.py \
            backend/src/main.py \
            telegram_gateway.py \
            vps_receiver.py \
            tools/benchmark_consultant.py

      - name: Verify backend route declarations
        run: |
          grep -q '@app.get("/runtime/config")' backend/src/main.py
          grep -q '@app.get("/runtime/routes")' backend/src/main.py
          grep -q '@app.get("/queue")' backend/src/main.py
          grep -q '@app.get("/notifications")' backend/src/main.py
          grep -q '@app.get("/approvals")' backend/src/main.py
          grep -q '@app.post("/approvals/{approval_id}/approve")' backend/src/main.py
          grep -q '@app.post("/approvals/{approval_id}/reject")' backend/src/main.py
          grep -q '@app.get("/artifacts/{artifact_path:path}")' backend/src/main.py
          grep -q '@app.get("/reports")' backend/src/main.py
          grep -q 'APP_NAME' backend/src/main.py
          grep -q 'VITE_APP_NAME' dashboard/src/App.tsx
          grep -q '/approvals' dashboard/src/App.tsx
          grep -q 'approval_id' telegram_gateway.py

      - name: Run consultant runtime tests
        run: python -m pytest -q tests/test_consultant_runtime.py

      - name: Run deterministic consultant benchmark
        run: python tools/benchmark_consultant.py --workspace . --output benchmark-results/ci_consultant_benchmark.json

      - name: Validate Docker Compose configuration
        env:
          APP_NAME: Workspace Runtime
          OPENAI_API_KEY: placeholder
          REAL_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          GEMINI_API_KEY: placeholder
          TELEGRAM_TOKEN: placeholder
          TELEGRAM_CHAT_ID: placeholder
          VPS_PUBLIC_IP: 127.0.0.1
          PWD: ${{ github.workspace }}
        run: |
          docker compose config >/tmp/prometheus-compose.yml
          docker compose -f docker-compose.core.yml config >/tmp/prometheus-core-compose.yml
          docker compose -f docker-compose.lean.yml config >/tmp/prometheus-lean-compose.yml
          grep -q 'prometheus_consultant.py' /tmp/prometheus-compose.yml
          grep -q 'prometheus_consultant.py' /tmp/prometheus-core-compose.yml
          grep -q 'prometheus_consultant.py' /tmp/prometheus-lean-compose.yml
          grep -q 'uvicorn' /tmp/prometheus-core-compose.yml
          grep -q 'uvicorn' /tmp/prometheus-lean-compose.yml
          grep -q 'docker/Dashboard.Dockerfile' /tmp/prometheus-lean-compose.yml
          grep -q 'profiles:' /tmp/prometheus-lean-compose.yml
          grep -q 'condition: service_healthy' /tmp/prometheus-core-compose.yml
          grep -q 'condition: service_healthy' /tmp/prometheus-lean-compose.yml
          test -x tools/docker_smoke_check.sh || chmod +x tools/docker_smoke_check.sh
          echo "Docker Compose configuration is valid for full, core, and lean modes."

      - name: Secret hygiene quick scan
        run: |
          set -euo pipefail
          matches="$(git grep -nE '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY)' -- . ':!README.md' ':!docs/**' ':!docker-compose.yml' ':!docker-compose.core.yml' ':!docker-compose.lean.yml' ':!config/**' ':!*.example' ':!**/*.example' || true)"
          matches="$(printf '%s\n' "$matches" | grep -v 'sk-prometheus-dummy' || true)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Potential committed secret found. Review the matches above."
            exit 1
          fi
          echo "No obvious committed secrets found."
