version: '3.8'

services:
  # 1. Central API Gateway
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    environment:
      - REAL_API_KEY=${REAL_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
    networks:
      - prometheus-public
      - prometheus-internal

  # 2. Redis Nervous System
  redis:
    image: redis:alpine
    networks:
      - prometheus-internal

  # 3. The CEO / Orchestrator (Securely Isolated)
  prometheus-manager:
    build: 
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - ./prometheus_manager.py:/app/prometheus_manager.py
      - ./memory_ledger.py:/app/memory_ledger.py
      - ./.prometheusignore:/app/.prometheusignore
    environment:
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-prometheus-dummy-internal-key
      - REDIS_HOST=redis
    depends_on:
      - litellm
      - redis
    networks:
      - prometheus-internal

  # 4. Web Dashboard (Frontend)
  dashboard:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host"]
    networks:
      - prometheus-public

  # 5. Dashboard Backend
  backend:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./backend:/app
      - ./workspace:/app/workspace
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-public
      - prometheus-internal

  # 6. Remote Vision & Hands Bridge (The Receiver)
  vision-bridge:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./vision_server.py:/app/vision_server.py
    ports:
      - "8765:8765"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-public
      - prometheus-internal

networks:
  prometheus-internal:
    driver: bridge
    internal: true # EXTREME SECURITY: Block manager from all internet access.
  prometheus-public:
    driver: bridge # Standard bridge for UI and API connectivity.
