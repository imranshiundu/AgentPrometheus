version: '3.8'

services:
  # 1. Central API Gateway (The Switchboard)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    environment:
      - REAL_API_KEY=${REAL_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
    networks:
      - prometheus-net

  # 2. Redis Nervous System (For Caching & Queues)
  redis:
    image: redis:alpine
    networks:
      - prometheus-net

  # 3. ChromaDB (The Hive Mind Experience Ledger)
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./workspace/hive_mind_db:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - prometheus-net

  # 4. OpenHands (The Coding Specialist & Sandbox)
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:main
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:main
      - LLM_BASE_URL=http://litellm:4000
      - LLM_API_KEY=sk-prometheus-dummy
      - WORKSPACE_MOUNT_PATH=${PWD}/workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
    networks:
      - prometheus-net

  # 5. The Orchestrator (The Brain)
  prometheus-orchestrator:
    build: 
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "prometheus_manager.py"]
    volumes:
      - ./workspace:/app/workspace
      - ./prometheus_manager.py:/app/prometheus_manager.py
      - ./memory_ledger.py:/app/memory_ledger.py
      - ./.prometheusignore:/app/.prometheusignore
    environment:
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-prometheus-dummy
      - REDIS_HOST=redis
      - CHROMA_HOST=chromadb
    depends_on:
      - litellm
      - redis
      - chromadb
    networks:
      - prometheus-net

  # 6. The Front Desk (Telegram Gateway)
  prometheus-frontdesk:
    build: 
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "telegram_gateway.py"]
    volumes:
      - ./workspace:/app/workspace
      - ./telegram_gateway.py:/app/telegram_gateway.py
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REDIS_HOST=redis
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP}
    depends_on:
      - redis
    networks:
      - prometheus-net

  # 7. Web Dashboard (Frontend)
  dashboard:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host"]
    networks:
      - prometheus-net

  # 8. Dashboard Backend
  backend:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./backend:/app
      - ./workspace:/app/workspace
      - ./vision_node.py:/app/vision_node.py
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-net

  # 9. Remote Vision & Hands Bridge
  vision-bridge:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./vps_receiver.py:/app/vps_receiver.py
      - ./workspace:/app/workspace
    ports:
      - "8765:8765"
    command: ["python", "vps_receiver.py"]
    networks:
      - prometheus-net

networks:
  prometheus-net:
    driver: bridge
