services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    env_file: .env
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      - redis
    networks:
      - prometheus-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - prometheus-net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./workspace/hive_mind_db:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - prometheus-net
    restart: unless-stopped

  prometheus-manager:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "prometheus_manager.py"]
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - ./prometheus_manager.py:/app/prometheus_manager.py:ro
      - ./prometheus_consultant.py:/app/prometheus_consultant.py:ro
      - ./memory_ledger.py:/app/memory_ledger.py:ro
      - ./.prometheusignore:/app/.prometheusignore:ro
    environment:
      - OPENAI_API_BASE=http://litellm:4000/v1
      - REDIS_HOST=redis
      - CHROMA_HOST=chromadb
    depends_on:
      - litellm
      - redis
      - chromadb
    networks:
      - prometheus-net
    restart: unless-stopped

  prometheus-frontdesk:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "telegram_gateway.py"]
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - ./telegram_gateway.py:/app/telegram_gateway.py:ro
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-net
    restart: unless-stopped

  backend:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    volumes:
      - ./backend:/app
      - ./workspace:/app/workspace
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-net
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: ["sh", "-lc", "test -d node_modules || npm install; npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend
    networks:
      - prometheus-net
    restart: unless-stopped

networks:
  prometheus-net:
    driver: bridge

volumes:
  redis-data:
