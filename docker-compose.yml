version: '3.8'

services:
  # 1. Central model gateway
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    environment:
      - REAL_API_KEY=${REAL_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - prometheus-net

  # 2. Redis event bus, task queue, logs, and notifications
  redis:
    image: redis:alpine
    networks:
      - prometheus-net

  # 3. Persistent memory store
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./workspace/hive_mind_db:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - prometheus-net

  # 4. Optional external coding sandbox
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:main
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:main
      - LLM_BASE_URL=http://litellm:4000
      - LLM_API_KEY=sk-prometheus-dummy
      - WORKSPACE_MOUNT_PATH=${PWD}/workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
    depends_on:
      - litellm
    networks:
      - prometheus-net

  # 5. Unified runtime: evidence scan -> deterministic checks -> consultant plan -> guarded patches
  prometheus-orchestrator:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "prometheus_consultant.py"]
    volumes:
      - ./workspace:/app/workspace
      - ./prometheus_consultant.py:/app/prometheus_consultant.py
      - ./prometheus_indexer.py:/app/prometheus_indexer.py
      - ./prometheus_json.py:/app/prometheus_json.py
      - ./.prometheusignore:/app/.prometheusignore
    environment:
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-prometheus-dummy
      - PROMETHEUS_CONSULTANT_MODEL=consultant-model
      - PROMETHEUS_CHEAP_MODEL=utility-model
      - PROMETHEUS_AUTO_APPLY=false
      - REDIS_HOST=redis
      - CHROMA_HOST=chromadb
    depends_on:
      - litellm
      - redis
      - chromadb
    networks:
      - prometheus-net

  # 6. Telegram gateway
  prometheus-frontdesk:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["python", "telegram_gateway.py"]
    volumes:
      - ./workspace:/app/workspace
      - ./telegram_gateway.py:/app/telegram_gateway.py
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REDIS_HOST=redis
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP}
    depends_on:
      - redis
    networks:
      - prometheus-net

  # 7. Web dashboard frontend
  dashboard:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_WS_BASE=ws://localhost:8000
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend
    networks:
      - prometheus-net

  # 8. Dashboard/API backend
  backend:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./workspace:/app/workspace
      - ./vision_node.py:/app/vision_node.py
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-net

  # 9. Remote vision and hands bridge
  vision-bridge:
    build:
      context: ./
      dockerfile: docker/Manager.Dockerfile
    volumes:
      - ./vps_receiver.py:/app/vps_receiver.py
      - ./workspace:/app/workspace
    ports:
      - "8765:8765"
    command: ["python", "vps_receiver.py"]
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - prometheus-net

networks:
  prometheus-net:
    driver: bridge
