model_list:
  # --- UNIFIED PROMETHEUS CONSULTANT ---
  - model_name: consultant-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: consultant-model-fallback
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/REAL_API_KEY

  # --- HIGH REASONING MODELS ---
  - model_name: orchestrator-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: orchestrator-model-fallback
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/REAL_API_KEY

  # --- CODING MODELS ---
  - model_name: coding-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: coding-model-fallback
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/REAL_API_KEY

  # --- RESEARCH MODELS ---
  - model_name: research-model
    litellm_params:
      model: google/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY
  - model_name: research-model-fallback
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/REAL_API_KEY

  # --- UTILITY MODELS ---
  - model_name: utility-model
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/REAL_API_KEY

litellm_settings:
  fallbacks:
    - {"consultant-model": ["consultant-model-fallback"]}
    - {"orchestrator-model": ["orchestrator-model-fallback"]}
    - {"coding-model": ["coding-model-fallback"]}
    - {"research-model": ["research-model-fallback"]}

  drop_params: true
  set_verbose: false

  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: 6379

  max_budget: 10.00
