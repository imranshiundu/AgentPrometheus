model_list:
  - model_name: gpt-4
    litellm_params:
      model: openai/gpt-4
      api_key: "os.environ/REAL_API_KEY"
  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo
      api_key: "os.environ/REAL_API_KEY"
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: "os.environ/REAL_API_KEY"

general_settings:
  master_key: "sk-prometheus-master-key"
  disable_on_budget_exceeded: true
