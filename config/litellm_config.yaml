model_list:
  # Claude-only model aliases for Consultant Mode.
  # The system performs deterministic scanning, queueing, testing, and file handling.
  # Claude is used as the consultant: planner, reviewer, risk analyst, and final critic.
  - model_name: consultant-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: orchestrator-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: coding-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: research-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: review-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: utility-model
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Claude-only fallback chain. No OpenAI, Gemini, or Groq fallback in this profile.
  fallbacks:
    - {"consultant-model": ["orchestrator-model", "utility-model"]}
    - {"orchestrator-model": ["utility-model"]}
    - {"coding-model": ["consultant-model", "utility-model"]}
    - {"research-model": ["consultant-model", "utility-model"]}
    - {"review-model": ["consultant-model", "utility-model"]}

  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120

  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: 6379

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
