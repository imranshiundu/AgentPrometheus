model_list:
  # Provider-neutral aliases. Agent Prometheus does the scanning, testing,
  # queueing, patch application, and reporting. The model is only consulted.
  # This lets the runtime work with weak/cheap models because the hard work is
  # converted into small evidence packets and strict JSON decisions.

  - model_name: consultant-model
    litellm_params:
      model: os.environ/PROMETHEUS_CONSULTANT_PROVIDER_MODEL
      api_key: os.environ/PROMETHEUS_CONSULTANT_API_KEY

  - model_name: review-model
    litellm_params:
      model: os.environ/PROMETHEUS_REVIEW_PROVIDER_MODEL
      api_key: os.environ/PROMETHEUS_REVIEW_API_KEY

  - model_name: utility-model
    litellm_params:
      model: os.environ/PROMETHEUS_UTILITY_PROVIDER_MODEL
      api_key: os.environ/PROMETHEUS_UTILITY_API_KEY

  # Optional ready-made examples. Keep these as aliases, not hard requirements.
  - model_name: groq-small-consultant
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-large-consultant
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: openai-small-consultant
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: anthropic-consultant
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  fallbacks:
    - {"consultant-model": ["review-model", "utility-model", "groq-small-consultant"]}
    - {"review-model": ["utility-model", "groq-small-consultant"]}
    - {"utility-model": ["groq-small-consultant"]}

  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120

  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: 6379

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
