model_list:
  # 1. THE ORCHESTRATOR & QA GUARDIAN (High Reasoning)
  # Needs deep logic to manage agents and verify specs.
  - model_name: orchestrator-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest 
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096

  # 2. THE SPECIALIST / OPENHANDS (Coding Champion)
  # Claude 3.5 Sonnet is currently the best at strict coding tasks.
  - model_name: coding-model
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192

  # 3. THE SCOUT / AUTOGPT (High Volume, Fast)
  # Web scraping and summarization don't need expensive models.
  - model_name: research-model
    litellm_params:
      model: gemini/gemini-2.0-flash # Adjusted to 2.0 based on availability
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  # 4. THE ARCHITECT & SUMMARIZER (Cheap Logic)
  # For scaffolding folders or compressing context between handoffs.
  - model_name: utility-model
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096

# --- TOKEN SAVING ARCHITECTURE ---
litellm_settings:
  # 1. Enable Caching (The 90% Discount)
  # This stops agents from paying to re-read their 10k token system prompts on every loop.
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: 6379

  # 2. Prevent Infinite Loops
  # Hard cap on the maximum budget any single framework can burn in a session.
  max_budget: 5.00 # Drops the connection if cost exceeds $5.00

  # 3. Standardize Output Logging
  # Crucial for tracking exactly which agent is burning the most tokens.
  success_callback: ["langfuse"] 
